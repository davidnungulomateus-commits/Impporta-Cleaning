<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Impporta - Autenticação</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <a href="./index.html" class="nav-brand">
        <img src="./logo.svg" alt="Impporta Logo" />
      </a>
      <ul class="nav-menu">
        <li><a href="./index.html#services" class="nav-link">O Que Fazemos</a></li>
        <li><a href="./index.html#process" class="nav-link">Como Funciona</a></li>
        <li><a href="./index.html#calculator" class="nav-link">Simulador</a></li>
      </ul>
      <div class="nav-actions">
        <a href="./index.html" class="btn btn-outline" style="border: none; color: var(--text-muted);">Voltar</a>
      </div>
    </div>
  </nav>

  <!-- Auth Section -->
  <section class="auth-wrapper">
    <div class="auth-card fade-up visible">
      <h2 id="auth-title">Bem-vindo de volta</h2>
      <p id="auth-subtitle">Entre na sua conta para gerir os seus agendamentos.</p>
      
      <!-- Social Logins -->
      <div class="social-btns">
        <button type="button" id="google-auth-btn" class="btn-social">
          <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continuar com Google
        </button>
      </div>

      <div class="auth-divider">ou usar e-mail</div>

      <!-- Email/Password Form -->
      <form id="auth-form" class="auth-form">
        <div id="name-field" class="form-group" style="display: none;">
          <label class="form-label" for="auth-name">Nome Completo</label>
          <input type="text" id="auth-name" class="form-control" placeholder="O seu nome">
        </div>
        <div class="form-group">
          <label class="form-label" for="auth-email">E-mail</label>
          <input type="email" id="auth-email" class="form-control" placeholder="exemplo@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="auth-password">Palavra-passe</label>
          <input type="password" id="auth-password" class="form-control" placeholder="Mínimo 6 caracteres" required>
        </div>
        
        <div id="auth-error" style="color: #ef4444; font-size: 0.9rem; display: none;">Erro ao autenticar. Verifique os seus dados.</div>
        
        <button type="submit" id="auth-submit-btn" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 8px;">Entrar</button>
      </form>

      <div class="auth-switch">
        <span id="auth-switch-text">Ainda não tem conta?</span> 
        <a id="auth-switch-btn">Criar Conta</a>
      </div>
    </div>
  </section>

  <script src="./auth.js"></script>
</body>
</html>
